# Manual target overrides.
# This file is NEVER overwritten by scrapers.
# Use it to add aliases, add/remove cores per target.
#
# Format:
#   platform_name:
#     targets:
#       target-name:
#         aliases: [alias1, alias2]
#         add_cores: [core_to_add]
#         remove_cores: [core_to_remove]

# Batocera: standalone emulators that Config.in selects via compound flags
# (BATOCERA_WINE, BATOCERA_CORES_STILL_COMMERCIALIZED) which the scraper
# doesn't resolve. These are confirmed available on x86_64 via Config.in.
batocera:
  targets:
    x86_64:
      add_cores: [citron, demul, model2, xenia]
    zen3:
      add_cores: [citron, demul, model2, xenia]

retroarch:
  targets:
    nintendo-switch:
      aliases: [switch, nx]
    linux-x86_64:
      aliases: [pc, linux, x86_64, desktop]
    playstation-ps2:
      aliases: [ps2]
    playstation-psp:
      aliases: [psp]
