emulator: Citra 2018
type: libretro
core_classification: frozen_snapshot
source: "https://github.com/libretro/citra2018"
upstream: "https://github.com/citra-emu/citra"
profiled_date: "2026-03-23"
core_version: "Git"
display_name: "Nintendo - 3DS (Citra 2018)"
cores: [citra2018]
systems:
  - nintendo-3ds

notes: |
  Frozen 2018 snapshot of the Citra 3DS emulator.
  Loads files from {system_dir}/Citra/sysdata/.
  ref: src/citra_libretro/citra_libretro.cpp:317, src/common/common_paths.h:24

  Embedded open-source replacement font in archive_ncch.cpp.
  ref: src/core/file_sys/archive_ncch.cpp:134-146

  firmware_count absent in .info (= 0). Both files are optional.

files:
  - name: aes_keys.txt
    system: nintendo-3ds
    required: false
    note: "AES encryption keys for decrypting 3DS content"
    source_ref: "src/core/hw/aes/key.cpp:72-76"

  - name: shared_font.bin
    system: nintendo-3ds
    required: false
    hle_fallback: true
    note: "system shared font, falls back to embedded open-source replacement"
    source_ref: "src/core/hle/service/apt/apt.cpp:168-183"
