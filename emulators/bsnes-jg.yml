emulator: bsnes-jg
type: libretro
core_classification: community_fork
source: "https://github.com/libretro/bsnes-jg"
upstream: "https://gitlab.com/jgemu/bsnes"
profiled_date: "2026-03-23"
core_version: "2.1.0"
display_name: "Nintendo - SNES / SFC (bsnes-jg)"
cores: [bsnes-jg]
systems:
  - nintendo-snes
  - nintendo-sgb
  - nintendo-satellaview
  - nintendo-sufami-turbo

notes: |
  Fork of bsnes v115 by Rupert Carmichael, rewritten for C++ standard library.
  Coprocessor firmware loaded from system_dir via openFileCallback.
  HLE available for DSP1/1B/2/4 and ST010 (core option bsnes_jg_coproc_preferhle).
  DSP3, ST011, ST018 require LLE firmware in all cases (no HLE path).
  CX4/HitachiDSP uses embedded static data ROM (3072 bytes), no external file.
  SGB1/SGB2 boot ROMs embedded (256 bytes each).
  BML game databases embedded as C++ string literals.

  ref: libretro/libretro.cpp:420-502 fileOpenV firmware loading callback
  ref: src/cartridge.cpp:754-829 uPD7725 (DSP1-4) LLE/HLE dispatch
  ref: src/cartridge.cpp:831-901 uPD96050 (ST010/ST011) LLE/HLE dispatch
  ref: src/cartridge.cpp:615-670 ARM6 (ST018) firmware loading
  ref: src/cartridge.cpp:672-752 HG51BS169 (HitachiDSP/CX4) embedded ROM + HLE
  ref: src/coprocessor/icd.cpp:249,260 SGB1/SGB2 boot ROMs embedded
  ref: src/cartridge.cpp:62 hitachidspStaticDataROM embedded
  ref: libretro/libretro.cpp:30-33 BML databases embedded

