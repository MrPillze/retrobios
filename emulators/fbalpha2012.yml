source: "https://github.com/libretro/fbalpha2012"
upstream: "https://www.fbalpha.com"
profiled_date: "2026-03-23"
core_version: "v0.2.97.29"
display_name: "Arcade (FB Alpha 2012)"
cores:
  - fbalpha2012
  - fbalpha
systems:
  - arcade
  - neogeo
  - cps1
  - cps2
  - cps3
