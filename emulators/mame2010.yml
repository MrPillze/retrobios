profiled_date: "2026-03-18"
core_version: "0.139"
display_name: "Arcade (MAME 2010)"
mame_version: "0.139"
systems:
  - snk-neogeo-mvs
  - igs-pgm
  - sega-naomi
  - sega-naomi2
  - sega-naomigd
  - sega-stv
  - sega-hikaru
  - sega-chihiro
  - sega-triforce
  - sega-model2
  - commodore-cd32
