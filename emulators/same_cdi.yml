    primary_zip: "cdimono1.zip"
    optional_zips: ["cdimono2.zip", "cdibios.zip"]
    mame_romsets: ["cdimono1", "cdimono2", "cdibios", "cdi910", "cdi490a"]
    rom_path_flag: "-rp"
