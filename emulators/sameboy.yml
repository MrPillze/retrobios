    - "BootROMs/sgb_boot.asm -> sgb_boot (256 bytes)"
    - "BootROMs/sgb2_boot.asm -> sgb2_boot (256 bytes)"
    - "BootROMs/cgb_boot.asm -> cgb_boot (2304 bytes)"
    - "BootROMs/agb_boot.asm -> agb_boot (2304 bytes)"
