emulator: MAME
type: standalone + libretro
core_classification: official_port
source: "https://github.com/libretro/mame"
upstream: "https://github.com/mamedev/mame"
logo: "https://raw.githubusercontent.com/mamedev/mame/master/docs/source/images/MAMElogo.svg"
profiled_date: "2026-03-29"
core_version: "0.286"
display_name: "Arcade (MAME)"

cores:
  - mame
  - imame4all
systems:
  - snk-neogeo-mvs
  - snk-neogeo-aes
  - igs-pgm
  - sega-naomi
  - sega-naomi2
  - sega-naomigd
  - sammy-atomiswave
  - sega-stv
  - sega-lindbergh
  - sega-hikaru
  - sega-chihiro
  - sega-triforce
  - deco-cassette
  - nintendo-playch10
  - sega-megaplay
  - sega-megatech
  - nintendo-sfcbox
  - nintendo-nss
  - philips-cdi
  - commodore-cubo
  - namco-system246
  - namco-system256
  - namco-system573
  - konami-viper
  - super-kaneko-nova
  - capcom-zn1
  - capcom-zn2
  - konami-gv
  - konami-twinkle
  - panasonic-3do
  - hyper-neogeo64
  - apple2gs
  - apf-m1000
  - bally-astrocade
  - coleco-adam
  - crvision
  - entex-advision
  - sega-ai
  - sega-beena
  - bandai-rx78
  - camplynx
  - tiger-game-com
  - gamepark-gp32
  - gamate
  - gamepock
  - hartung-game-master
  - fm7
  - laser310
  - casio-loopy
  - casio-pv1000
  - casio-pv2000
  - pegasus
  - pcw
  - trs80

notes: |
  Rolling release tracking mamedev/mame upstream (currently 0.286).
  80 BIOS root sets + 22 system ROM sets (apple2gs, astrocade, adam, advision, apfm1000, beena, camplynx, casloopy, crvision, fm7, gamate, gamecom, gamepock, gmaster, gp32, laser310, pcw, pegasus, pv2000, rx78, segaai, trs80). romload.cpp
  unmodified. No hiscore support.
  Paths under system_dir/mame/ (artwork, cheat, hash, ini, plugins,
  samples, crosshair). ROM search: content_dir + system_dir/mame/bios +
  system_dir/mame/roms. Cheats via per-game XML files.

  BIOS root set names follow current MAME conventions. ZN-based boards
  renamed from legacy names (cpzn1 → coh1000c, atpsx → coh1000a, etc.).
  File structure uses vendor-based paths (src/mame/{vendor}/).

