emulator: bsnes-hd beta
type: libretro
core_classification: enhanced_fork
source: "https://github.com/DerKoun/bsnes-hd"
upstream: "https://github.com/bsnes-emu/bsnes"
profiled_date: "2026-03-23"
core_version: "v10.6"
display_name: "Nintendo - SNES / SFC (bsnes-hd beta)"
cores: [bsnes_hd_beta, bsneshd, bsnes_hd]
systems:
  - nintendo-snes
  - nintendo-sgb
  - nintendo-satellaview
  - nintendo-sufami-turbo

notes: |
  bsnes-hd beta is a fork of bsnes ~v114 by DerKoun with widescreen
  and true color rendering. Firmware handling identical to bsnes v115.
  repo Version="10.6", SerializerVersion="114.2"
  ref: bsnes/emulator/emulator.hpp:33-34,40

  SGB boot ROMs embedded in binary (icd/boot-roms.cpp:1,12).
  SGB1.sfc/SGB2.sfc are SGB cartridge ROMs (not boot ROMs).
  HLE available for DSP1/1B/2/4, ST010, CX4 (default ON in libretro).
  DSP3, ST011, ST018 have no HLE.
  Coprocessor firmware not loaded from system_dir in libretro wrapper;
  HLE used by default, LLE requires firmware embedded in ROM.
  ref: sfc/cartridge/load.cpp:431,506,586
  ref: sfc/coprocessor/icd/icd.cpp:87,90
  ref: target-libretro/libretro_core_options.h:462-470

