emulator: EightyOne
type: standalone + libretro
core_classification: community_fork
source: "https://github.com/libretro/81-libretro"
upstream: "https://github.com/charlierobson/EightyOne"
profiled_date: "2026-03-22"
core_version: "1.0a"
display_name: "Sinclair - ZX 81 (EightyOne)"
cores: [81]
systems:
  - sinclair-zx81
  - sinclair-zx80
  - sinclair-zx-spectrum
  - jupiter-ace
  - timex-ts1500
  - timex-tc2048
  - timex-ts2068
  - lambda-8300
  - ringo-r470
  - microdigital-tk85

notes: |
  Libretro port embeds zx81.rom and dkchr.rom as C arrays (xxd -i).
  Core never accesses filesystem for ROMs. Hardcodes MACHINEZX81.
  ref: 81-libretro/81/zx81/snap.c:487-508, src/libretro.cpp:393

  Original EightyOne supports 15+ machines, loads ROMs from ROM/ directory.
  ref: EightyOne/Source/zx81/zx81.cpp:309, EightyOne/Source/HW_.cpp:2734

  .info has no firmware declarations (firmware_count absent).

