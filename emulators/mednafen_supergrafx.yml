    description: "CD-ROM System Card 3.0 (Japan)"
    region: "NTSC-J"
    required: true
    source_ref: "libretro.cpp:972-973, mednafen/settings.cpp:37"
    notes: "Default value for sgx_cdbios option."

  - name: "syscard2.pce"
